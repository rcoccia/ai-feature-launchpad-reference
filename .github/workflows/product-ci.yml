name: product-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore locked dependencies
        run: dotnet restore AI.FeatureLaunchpad.sln --locked-mode
      - name: Build
        run: dotnet build AI.FeatureLaunchpad.sln --configuration Release --no-restore
      - name: Run integration tests
        run: dotnet test AI.FeatureLaunchpad.sln --configuration Release --no-build
